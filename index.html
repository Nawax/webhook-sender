<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Webhook Sender</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1f22;
      --surface: #2b2d31;
      --surface2: #313338;
      --surface3: #383a40;
      --border: #3f4147;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --danger: #ed4245;
      --success: #57f287;
      --text: #dbdee1;
      --text-muted: #949ba4;
      --text-dim: #6d6f78;
      --embed-left: #5865f2;
      --radius: 4px;
      --radius-lg: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-logo {
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-logo svg { width: 24px; height: 24px; }
    .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
    .btn {
      padding: 6px 14px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #c03537; }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface3); color: var(--text); }
    .btn-success { background: #248046; color: #fff; }
    .btn-success:hover { background: #1a6334; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL (editor) ── */
    .editor {
      width: 420px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .editor-scroll::-webkit-scrollbar { width: 6px; }
    .editor-scroll::-webkit-scrollbar-track { background: transparent; }
    .editor-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Webhook URL */
    .webhook-section { display: flex; flex-direction: column; gap: 8px; }
    .label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-muted);
    }
    .input-row { display: flex; gap: 8px; }
    input[type="text"], input[type="url"], textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      width: 100%;
    }
    input[type="text"]:focus, input[type="url"]:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    input[type="text"]::placeholder, textarea::placeholder { color: var(--text-dim); }

    .char-count { font-size: 11px; color: var(--text-dim); text-align: right; }

    /* Section blocks */
    .section-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .section-header:hover { background: var(--surface3); }
    .section-arrow {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .section-arrow.open { transform: rotate(90deg); }
    .section-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .section-body.hidden { display: none; }

    /* Embed block */
    .embed-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--embed-left);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .embed-header {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .embed-header:hover { background: var(--surface3); }
    .embed-header span { flex: 1; }
    .embed-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 28px; height: 28px;
      background: none; border: none;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .icon-btn:hover { background: var(--surface3); color: var(--text); }
    .icon-btn.danger:hover { background: #3a1c1e; color: var(--danger); }

    .embed-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
    .embed-body.hidden { display: none; }

    /* Fields */
    .field-item {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .field-header {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .field-header:hover { background: rgba(255,255,255,0.04); }
    .field-header span { flex: 1; font-size: 12px; color: var(--text); }
    .field-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .field-body.hidden { display: none; }
    .field-row { display: flex; gap: 8px; align-items: flex-start; }
    .field-row .flex-1 { flex: 1; }
    .inline-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      padding-top: 28px;
    }
    .toggle {
      position: relative;
      width: 34px; height: 18px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* Color picker */
    .color-row { display: flex; gap: 8px; align-items: center; }
    input[type="color"] {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2px;
      background: var(--bg);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Preview panel */
    .preview {
      flex: 1;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .preview-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .preview-scroll::-webkit-scrollbar { width: 6px; }
    .preview-scroll::-webkit-scrollbar-track { background: transparent; }
    .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Discord message preview */
    .discord-msg {
      display: flex;
      gap: 16px;
      padding: 4px 0;
    }
    .discord-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      overflow: hidden;
    }
    .discord-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .discord-content { flex: 1; min-width: 0; }
    .discord-username {
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      margin-bottom: 4px;
    }
    .discord-username .bot-tag {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .discord-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.375;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 4px;
    }

    /* Embed preview */
    .discord-embed {
      display: flex;
      max-width: 520px;
      background: #2b2d31;
      border-radius: 4px;
      border-left: 4px solid var(--embed-left);
      overflow: hidden;
      margin-top: 4px;
    }
    .discord-embed-inner {
      flex: 1;
      padding: 12px 16px 16px;
      min-width: 0;
    }
    .discord-embed-author {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .discord-embed-author-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      object-fit: cover;
    }
    .discord-embed-author-name {
      font-size: 12px;
      font-weight: 600;
      color: #dbdee1;
    }
    .discord-embed-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.375;
    }
    .discord-embed-title a { color: #00aff4; text-decoration: none; }
    .discord-embed-title a:hover { text-decoration: underline; }
    .discord-embed-description {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .discord-embed-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .discord-embed-field { min-width: 0; }
    .discord-embed-field.inline { flex: 1; min-width: 120px; }
    .discord-embed-field-name {
      font-size: 13px;
      font-weight: 700;
      color: #dbdee1;
      margin-bottom: 2px;
    }
    .discord-embed-field-value {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .discord-embed-image img {
      max-width: 100%;
      border-radius: 4px;
      margin-top: 12px;
    }
    .discord-embed-thumbnail {
      flex-shrink: 0;
      padding: 12px 12px 0 0;
    }
    .discord-embed-thumbnail img {
      width: 80px; height: 80px;
      border-radius: 4px;
      object-fit: cover;
    }
    .discord-embed-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .discord-embed-footer-icon {
      width: 16px; height: 16px;
      border-radius: 50%;
    }
    .discord-embed-footer-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Empty state */
    .empty-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 14px;
      gap: 12px;
      text-align: center;
    }
    .empty-preview svg { opacity: 0.3; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
    }
    .toast {
      padding: 12px 18px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.success { background: #248046; }
    .toast.error { background: var(--danger); }
    .toast.info { background: var(--accent); }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Scrollbar global */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Send section */
    .send-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Markdown helpers */
    .md-bold { font-weight: 700; }
    .md-italic { font-style: italic; }
    .md-code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 3px; font-size: 85%; }
    .md-h1, .md-h2, .md-h3 { font-weight: 700; }
    .md-h1 { font-size: 1.3em; }
    .md-h2 { font-size: 1.15em; }
    .md-h3 { font-size: 1.05em; }

    /* Misc */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mt-4 { margin-top: 4px; }
    textarea { resize: vertical; min-height: 60px; }
    .divider { height: 1px; background: var(--border); margin: 4px 0; }
    .text-muted { color: var(--text-muted); font-size: 12px; }
    .flex-row { display: flex; align-items: center; gap: 8px; }
    select option { background: var(--surface2); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865f2"/>
    </svg>
    Webhook Sender
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost btn-sm" onclick="clearAll()">Réinitialiser</button>
    <button class="btn btn-ghost btn-sm" onclick="saveToJSON()">Exporter JSON</button>
    <button class="btn btn-ghost btn-sm" onclick="loadFromJSON()">Importer JSON</button>
  </div>
</div>

<div class="main">
  <!-- EDITOR -->
  <div class="editor">
    <div class="editor-scroll" id="editorScroll">

      <!-- Webhook URL -->
      <div class="webhook-section">
        <div class="label">Webhook URL</div>
        <div class="input-row">
          <input type="url" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." oninput="saveState()" />
        </div>
      </div>

      <!-- Profile section -->
      <div class="section-block">
        <div class="section-header" onclick="toggleSection('profile')">
          <svg class="section-arrow" id="arrow-profile" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          Profil du webhook
        </div>
        <div class="section-body hidden" id="body-profile">
          <div>
            <div class="label">Nom d'affichage</div>
            <div class="mt-4"><input type="text" id="profileName" placeholder="Nom du bot" maxlength="80" oninput="updatePreview(); saveState()" /></div>
          </div>
          <div>
            <div class="label">URL de l'avatar</div>
            <div class="mt-4"><input type="url" id="profileAvatar" placeholder="https://..." oninput="updatePreview(); saveState()" /></div>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="section-block">
        <div class="section-header" onclick="toggleSection('content')">
          <svg class="section-arrow" id="arrow-content" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          Message
        </div>
        <div class="section-body hidden" id="body-content">
          <div>
            <div class="label" style="display:flex;justify-content:space-between">Contenu <span class="char-count" id="contentCount">0/2000</span></div>
            <div class="mt-4">
              <textarea id="messageContent" rows="4" maxlength="2000" placeholder="Contenu du message (markdown supporté)..." oninput="countChars('messageContent','contentCount',2000); updatePreview(); saveState()"></textarea>
            </div>
          </div>
          <div class="text-muted">Supporte le markdown Discord : **gras**, *italique*, __souligné__, ~~barré~~, `code`, > citation</div>
        </div>
      </div>

      <!-- Embeds -->
      <div id="embedsContainer"></div>

      <!-- Add embed button -->
      <button class="btn btn-ghost" onclick="addEmbed()" style="width:100%;border-style:dashed">
        + Ajouter un Embed
      </button>

    </div>

    <!-- Send bar -->
    <div class="send-bar">
      <button class="btn btn-success" style="flex:1; padding:10px" onclick="sendWebhook()">
        ▶ Envoyer
      </button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div class="preview-header">Aperçu</div>
    <div class="preview-scroll">
      <div id="previewContainer">
        <div class="empty-preview">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <div>Remplis le formulaire pour voir l'aperçu</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="handleJSONFile(event)" />

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  webhookUrl: '',
  profileName: '',
  profileAvatar: '',
  content: '',
  embeds: []
};
let embedCount = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const saved = localStorage.getItem('webhookSenderState');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      loadState(s);
    } catch(e) {}
  }
});

function loadState(s) {
  state = { webhookUrl: '', profileName: '', profileAvatar: '', content: '', embeds: [], ...s };
  document.getElementById('webhookUrl').value = state.webhookUrl || '';
  document.getElementById('profileName').value = state.profileName || '';
  document.getElementById('profileAvatar').value = state.profileAvatar || '';
  document.getElementById('messageContent').value = state.content || '';
  countChars('messageContent','contentCount',2000);
  document.getElementById('embedsContainer').innerHTML = '';
  embedCount = 0;
  (state.embeds || []).forEach(e => addEmbed(e));
  updatePreview();
}

function saveState() {
  state.webhookUrl = document.getElementById('webhookUrl').value;
  state.profileName = document.getElementById('profileName').value;
  state.profileAvatar = document.getElementById('profileAvatar').value;
  state.content = document.getElementById('messageContent').value;
  // embeds are updated on the fly
  localStorage.setItem('webhookSenderState', JSON.stringify(state));
}

// ─── SECTION TOGGLE ───────────────────────────────────────────────────────────
function toggleSection(id) {
  const body = document.getElementById('body-' + id);
  const arrow = document.getElementById('arrow-' + id);
  body.classList.toggle('hidden');
  arrow.classList.toggle('open');
}

// ─── CHAR COUNT ───────────────────────────────────────────────────────────────
function countChars(inputId, countId, max) {
  const val = document.getElementById(inputId).value.length;
  const el = document.getElementById(countId);
  if (el) el.textContent = val + '/' + max;
}

// ─── EMBEDS ───────────────────────────────────────────────────────────────────
function addEmbed(data = {}) {
  const id = ++embedCount;
  const idx = state.embeds.length;
  const embed = {
    id,
    title: data.title || '',
    titleUrl: data.titleUrl || '',
    description: data.description || '',
    color: data.color || '#5865f2',
    authorName: data.authorName || '',
    authorUrl: data.authorUrl || '',
    authorIconUrl: data.authorIconUrl || '',
    thumbnail: data.thumbnail || '',
    image: data.image || '',
    footerText: data.footerText || '',
    footerIconUrl: data.footerIconUrl || '',
    fields: data.fields || []
  };
  state.embeds.push(embed);

  const el = document.createElement('div');
  el.className = 'embed-block';
  el.id = 'embed-' + id;
  el.style.borderLeftColor = embed.color;
  el.innerHTML = embedHTML(id, embed);
  document.getElementById('embedsContainer').appendChild(el);

  // restore fields
  embed.fields.forEach((f, fi) => addField(id, f));
  updatePreview();
  return embed;
}

function embedHTML(id, embed) {
  return `
    <div class="embed-header" onclick="toggleEmbed(${id})">
      <svg class="section-arrow" id="embed-arrow-${id}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>

      <div class="embed-actions" onclick="event.stopPropagation()">

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="embed-body" id="embed-body-${id}">

        <div class="color-row mt-4">
          <input type="color" value="${embed.color}" onchange="updateEmbedField(${id},'color',this.value); document.getElementById('embed-${id}').style.borderLeftColor=this.value" />
          <input type="text" value="${embed.color}" style="width:100px" oninput="updateEmbedColorFromText(${id},this)" />
        </div>
      </div>
      <!-- Author -->
      <div class="section-block">
        <div class="section-header" onclick="toggleSection('embed${id}-author')">
          <svg class="section-arrow" id="arrow-embed${id}-author" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          Auteur
        </div>
        <div class="section-body hidden" id="body-embed${id}-author">
          <div><div class="label">Nom</div><div class="mt-4"><input type="text" placeholder="Nom de l'auteur" value="${escapeHTML(embed.authorName)}" oninput="updateEmbedField(${id},'authorName',this.value)" maxlength="256" /></div></div>
          <div class="grid-2">
            <div><div class="label">URL</div><div class="mt-4"><input type="url" placeholder="https://..." value="${escapeHTML(embed.authorUrl)}" oninput="updateEmbedField(${id},'authorUrl',this.value)" /></div></div>
            <div><div class="label">URL Icône</div><div class="mt-4"><input type="url" placeholder="https://..." value="${escapeHTML(embed.authorIconUrl)}" oninput="updateEmbedField(${id},'authorIconUrl',this.value)" /></div></div>
          </div>
        </div>
      </div>
      <!-- Body -->
      <div class="section-block">
        <div class="section-header" onclick="toggleSection('embed${id}-body')">
          <svg class="section-arrow" id="arrow-embed${id}-body" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          Titre & Description
        </div>
        <div class="section-body hidden" id="body-embed${id}-body">
          <div class="grid-2">
            <div><div class="label">Titre</div><div class="mt-4"><input type="text" placeholder="Titre de l'embed" value="${escapeHTML(embed.title)}" oninput="updateEmbedField(${id},'title',this.value); updateEmbedLabel(${id})" maxlength="256" /></div></div>
            <div><div class="label">URL du titre</div><div class="mt-4"><input type="url" placeholder="https://..." value="${escapeHTML(embed.titleUrl)}" oninput="updateEmbedField(${id},'titleUrl',this.value)" /></div></div>
          </div>
          <div>
            <div class="label" style="display:flex;justify-content:space-between">Description <span class="char-count" id="desc-count-${id}">0/4096</span></div>
            <div class="mt-4"><textarea rows="5" maxlength="4096" placeholder="Description (markdown Discord supporté)..." oninput="updateEmbedField(${id},'description',this.value); countDescChars(${id},this.value)">${escapeHTML(embed.description)}</textarea></div>
          </div>
        </div>
      </div>
      <!-- Fields -->
      <div class="section-block">
        <div class="section-header" onclick="toggleSection('embed${id}-fields')">
          <svg class="section-arrow" id="arrow-embed${id}-fields" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          Champs (Fields)
        </div>
        <div class="section-body hidden" id="body-embed${id}-fields">
          <div id="fields-${id}"></div>
          <button class="btn btn-ghost btn-sm" onclick="addField(${id})" style="border-style:dashed;width:100%">+ Ajouter un champ</button>
        </div>
      </div>
      <!-- Images -->
      <div class="section-block">
        <div class="section-header" onclick="toggleSection('embed${id}-images')">
          <svg class="section-arrow" id="arrow-embed${id}-images" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          Images
        </div>
        <div class="section-body hidden" id="body-embed${id}-images">
          <div><div class="label">Image principale (URL)</div><div class="mt-4"><input type="url" placeholder="https://..." value="${escapeHTML(embed.image)}" oninput="updateEmbedField(${id},'image',this.value)" /></div></div>
          <div><div class="label">Miniature / Thumbnail (URL)</div><div class="mt-4"><input type="url" placeholder="https://..." value="${escapeHTML(embed.thumbnail)}" oninput="updateEmbedField(${id},'thumbnail',this.value)" /></div></div>
        </div>

      <!-- Footer -->
      <div class="section-block">

          Pied de page
        </div>
        <div class="section-body hidden" id="body-embed${id}-footer">
          <div><div class="label">Texte</div><div class="mt-4"><input type="text" placeholder="Texte du footer" value="${escapeHTML(embed.footerText)}" oninput="updateEmbedField(${id},'footerText',this.value)" maxlength="2048" /></div></div>
          <div><div class="label">URL Icône</div><div class="mt-4"><input type="url" placeholder="https://..." value="${escapeHTML(embed.footerIconUrl)}" oninput="updateEmbedField(${id},'footerIconUrl',this.value)" /></div></div>
        </div>
      </div>

function toggleEmbed(id) {
  const body = document.getElementById('embed-body-' + id);
  const arrow = document.getElementById('embed-arrow-' + id);
  body.classList.toggle('hidden');
  arrow.classList.toggle('open');
}

function removeEmbed(id) {
  const idx = state.embeds.findIndex(e => e.id === id);
  if (idx !== -1) state.embeds.splice(idx, 1);
  document.getElementById('embed-' + id)?.remove();
  updatePreview();
  saveState();
}

function updateEmbedField(id, field, value) {
  const embed = state.embeds.find(e => e.id === id);
  if (embed) embed[field] = value;
  updatePreview();
  saveState();
}

function updateEmbedColorFromText(id, input) {
  const val = input.value;
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    updateEmbedField(id, 'color', val);
    document.getElementById('embed-' + id).style.borderLeftColor = val;
    // update color picker
    const picker = document.querySelector(`#embed-${id} input[type="color"]`);
    if (picker) picker.value = val;
  }
}

function updateEmbedLabel(id) {
  const embed = state.embeds.find(e => e.id === id);
  const header = document.querySelector(`#embed-${id} .embed-header strong`);
  if (header && embed) header.textContent = embed.title || 'Nouveau embed';
}

function countDescChars(id, val) {
  const el = document.getElementById('desc-count-' + id);
  if (el) el.textContent = val.length + '/4096';
}

// ─── FIELDS ──────────────────────────────────────────────────────────────────
let fieldCount = 0;
function addField(embedId, data = {}) {
  const fid = ++fieldCount;
  const embed = state.embeds.find(e => e.id === embedId);
  if (!embed) return;
  const field = { fid, name: data.name || '', value: data.value || '', inline: data.inline || false };
  if (!data.fid) embed.fields.push(field);
  else { field.fid = data.fid; Object.assign(field, data); } // restore

  const container = document.getElementById('fields-' + embedId);
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'field-item';
  el.id = 'field-' + fid;
  el.innerHTML = `
    <div class="field-header" onclick="toggleField(${fid})">
      <svg style="width:14px;height:14px;flex-shrink:0;color:var(--text-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
      <span id="field-label-${fid}">${escapeHTML(field.name || 'Champ sans nom')}</span>
      <div onclick="event.stopPropagation()" style="display:flex;gap:4px">
        <button class="icon-btn danger" onclick="removeField(${embedId},${fid})" title="Supprimer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="field-body hidden" id="field-body-${fid}">
      <div>
        <div class="label">Nom du champ</div>
        <div class="mt-4"><input type="text" placeholder="Nom" value="${escapeHTML(field.name)}" maxlength="256" oninput="updateFieldProp(${embedId},${fid},'name',this.value)" /></div>
      </div>
      <div>
        <div class="label">Valeur</div>
        <div class="mt-4"><textarea rows="3" placeholder="Valeur (markdown supporté)" maxlength="1024" oninput="updateFieldProp(${embedId},${fid},'value',this.value)">${escapeHTML(field.value)}</textarea></div>
      </div>
      <div class="inline-toggle">
        <label class="toggle">
          <input type="checkbox" ${field.inline ? 'checked' : ''} onchange="updateFieldProp(${embedId},${fid},'inline',this.checked)" />
          <span class="toggle-slider"></span>
        </label>
        Inline
      </div>
    </div>
  `;
  container.appendChild(el);
}

function toggleField(fid) {
  document.getElementById('field-body-' + fid)?.classList.toggle('hidden');
}

function updateFieldProp(embedId, fid, prop, value) {
  const embed = state.embeds.find(e => e.id === embedId);
  if (!embed) return;
  const field = embed.fields.find(f => f.fid === fid);
  if (!field) return;
  field[prop] = value;
  if (prop === 'name') {
    const lbl = document.getElementById('field-label-' + fid);
    if (lbl) lbl.textContent = value || 'Champ sans nom';
  }
  updatePreview(); saveState();
}

function removeField(embedId, fid) {
  const embed = state.embeds.find(e => e.id === embedId);
  if (embed) embed.fields = embed.fields.filter(f => f.fid !== fid);
  document.getElementById('field-' + fid)?.remove();
  updatePreview(); saveState();
}

// ─── MARKDOWN RENDERER ───────────────────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHTML(text);
  // Headers
  html = html.replace(/^### (.+)$/gm, '<span class="md-h3">$1</span>');
  html = html.replace(/^## (.+)$/gm, '<span class="md-h2">$1</span>');
  html = html.replace(/^# (.+)$/gm, '<span class="md-h1">$1</span>');
  // Bold italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/_(.+?)_/g, '<em>$1</em>');
  // Strikethrough
  html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Inline code
  html = html.replace(/`(.+?)`/g, '<code class="md-code">$1</code>');
  // Underline (Discord specific)
  html = html.replace(/&lt;u&gt;(.+?)&lt;\/u&gt;/g, '<u>$1</u>');
  // Block quote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote style="border-left:3px solid #4f545c;padding-left:8px;margin:2px 0">$1</blockquote>');
  // Newlines
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHTML(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── PREVIEW ─────────────────────────────────────────────────────────────────
function updatePreview() {
  const name = document.getElementById('profileName').value.trim();
  const avatar = document.getElementById('profileAvatar').value.trim();
  const content = document.getElementById('messageContent').value;
  const hasContent = content.trim() || state.embeds.length > 0;

  const container = document.getElementById('previewContainer');
  if (!hasContent && !name) {
    container.innerHTML = `<div class="empty-preview">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div>Remplis le formulaire pour voir l'aperçu</div>
    </div>`;
    return;
  }

  const avatarHTML = avatar
    ? `<img src="${escapeHTML(avatar)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span style="display:none">${(name || 'W')[0].toUpperCase()}</span>`
    : `<span>${(name || 'W')[0].toUpperCase()}</span>`;

  const embedsHTML = state.embeds.map(e => buildEmbedPreview(e)).join('');

  container.innerHTML = `
    <div class="discord-msg">
      <div class="discord-avatar">${avatarHTML}</div>
      <div class="discord-content">
        <div class="discord-username">${escapeHTML(name || 'Webhook')} <span class="bot-tag">APP</span></div>
        ${content ? `<div class="discord-text">${renderMarkdown(content)}</div>` : ''}
        ${embedsHTML}
      </div>
    </div>
  `;
}

function buildEmbedPreview(embed) {
  const color = embed.color || '#5865f2';
  let html = `<div class="discord-embed" style="border-left-color:${escapeHTML(color)}">`;

  if (embed.thumbnail) {
    html += `<div class="discord-embed-thumbnail"><img src="${escapeHTML(embed.thumbnail)}" alt="" /></div>`;
  }

  html += `<div class="discord-embed-inner">`;

  if (embed.authorName) {
    html += `<div class="discord-embed-author">`;
    if (embed.authorIconUrl) html += `<img class="discord-embed-author-icon" src="${escapeHTML(embed.authorIconUrl)}" alt="" />`;
    const authorContent = embed.authorUrl
      ? `<a href="${escapeHTML(embed.authorUrl)}" target="_blank" rel="noopener">${escapeHTML(embed.authorName)}</a>`
      : escapeHTML(embed.authorName);
    html += `<span class="discord-embed-author-name">${authorContent}</span></div>`;
  }

  if (embed.title) {
    html += `<div class="discord-embed-title">`;
    html += embed.titleUrl ? `<a href="${escapeHTML(embed.titleUrl)}" target="_blank" rel="noopener">${renderMarkdown(embed.title)}</a>` : renderMarkdown(embed.title);
    html += `</div>`;
  }

  if (embed.description) {
    html += `<div class="discord-embed-description">${renderMarkdown(embed.description)}</div>`;
  }

  if (embed.fields && embed.fields.length > 0) {
    html += `<div class="discord-embed-fields">`;
    embed.fields.forEach(f => {
      html += `<div class="discord-embed-field ${f.inline ? 'inline' : ''}">
        <div class="discord-embed-field-name">${renderMarkdown(f.name)}</div>
        <div class="discord-embed-field-value">${renderMarkdown(f.value)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (embed.image) {
    html += `<div class="discord-embed-image"><img src="${escapeHTML(embed.image)}" alt="" /></div>`;
  }

  if (embed.footerText || embed.footerIconUrl) {
    html += `<div class="discord-embed-footer">`;
    if (embed.footerIconUrl) html += `<img class="discord-embed-footer-icon" src="${escapeHTML(embed.footerIconUrl)}" alt="" />`;
    if (embed.footerText) html += `<span class="discord-embed-footer-text">${escapeHTML(embed.footerText)}</span>`;
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
async function sendWebhook() {
  const url = document.getElementById('webhookUrl').value.trim();
  if (!url) return showToast('error', 'URL du webhook manquante !');
  if (!url.includes('discord.com/api/webhooks/')) return showToast('error', 'URL webhook Discord invalide');

  const name = document.getElementById('profileName').value.trim();
  const avatar = document.getElementById('profileAvatar').value.trim();
  const content = document.getElementById('messageContent').value.trim();

  if (!content && state.embeds.length === 0) {
    return showToast('error', 'Ajoute du contenu ou un embed !');
  }

  const payload = {};
  if (content) payload.content = content;
  if (name) payload.username = name;
  if (avatar) payload.avatar_url = avatar;
  if (state.embeds.length > 0) {
    payload.embeds = state.embeds.map(e => {
      const embed = {};
      if (e.title) embed.title = e.title;
      if (e.titleUrl) embed.url = e.titleUrl;
      if (e.description) embed.description = e.description;
      if (e.color) embed.color = parseInt(e.color.replace('#', ''), 16);
      if (e.authorName) {
        embed.author = { name: e.authorName };
        if (e.authorUrl) embed.author.url = e.authorUrl;
        if (e.authorIconUrl) embed.author.icon_url = e.authorIconUrl;
      }
      if (e.thumbnail) embed.thumbnail = { url: e.thumbnail };
      if (e.image) embed.image = { url: e.image };
      if (e.footerText || e.footerIconUrl) {
        embed.footer = {};
        if (e.footerText) embed.footer.text = e.footerText;
        if (e.footerIconUrl) embed.footer.icon_url = e.footerIconUrl;
      }
      if (e.fields && e.fields.length > 0) {
        embed.fields = e.fields.map(f => ({
          name: f.name || '\u200b',
          value: f.value || '\u200b',
          inline: f.inline || false
        }));
      }
      return embed;
    });
  }

  try {
    showToast('info', 'Envoi en cours...');
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok || res.status === 204) {
      showToast('success', '✓ Message envoyé avec succès !');
    } else {
      const err = await res.json().catch(() => ({}));
      showToast('error', 'Erreur ' + res.status + ' : ' + (err.message || 'Inconnue'));
    }
  } catch (e) {
    showToast('error', 'Erreur réseau : ' + e.message);
  }
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function showToast(type, msg) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function clearAll() {
  if (!confirm('Réinitialiser tout le formulaire ?')) return;
  localStorage.removeItem('webhookSenderState');
  state = { webhookUrl: '', profileName: '', profileAvatar: '', content: '', embeds: [] };
  embedCount = 0;
  fieldCount = 0;
  document.getElementById('webhookUrl').value = '';
  document.getElementById('profileName').value = '';
  document.getElementById('profileAvatar').value = '';
  document.getElementById('messageContent').value = '';
  document.getElementById('embedsContainer').innerHTML = '';
  document.getElementById('contentCount').textContent = '0/2000';
  updatePreview();
}

function saveToJSON() {
  const data = {
    webhookUrl: document.getElementById('webhookUrl').value,
    profileName: document.getElementById('profileName').value,
    profileAvatar: document.getElementById('profileAvatar').value,
    content: document.getElementById('messageContent').value,
    embeds: state.embeds
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'webhook-message.json';
  a.click();
  showToast('success', 'JSON exporté !');
}

function loadFromJSON() {
  document.getElementById('jsonFileInput').click();
}

function handleJSONFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      loadState(data);
      showToast('success', 'JSON importé avec succès !');
    } catch(err) {
      showToast('error', 'Fichier JSON invalide');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}
</script>
