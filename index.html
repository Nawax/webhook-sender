<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NWX — Webhook Sender</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7c3aed;
      --purple-light: #9d5cf5;
      --purple-dim: #4c1d95;
      --purple-glow: rgba(124,58,237,0.25);
      --purple-border: rgba(124,58,237,0.4);
      --bg: #0a0a0f;
      --surface: #0f0f1a;
      --surface2: #13131f;
      --surface3: #1a1a2e;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(124,58,237,0.35);
      --text: #e2e2f0;
      --text-muted: #7a7a9a;
      --text-dim: #3a3a5a;
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 6px;
      --radius-lg: 10px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px;
    }

    /* ─── SCANLINE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
    }
    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
      opacity: 0.6;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-img {
      height: 32px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(124,58,237,0.5));
    }
    .logo-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .logo-title span { color: var(--purple-light); }

    .topbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple-light);
      box-shadow: 0 0 14px var(--purple-glow);
    }
    .btn-primary:hover {
      background: var(--purple-light);
      box-shadow: 0 0 22px rgba(157,92,245,0.4);
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }
    .btn-ghost:hover {
      background: var(--surface3);
      border-color: var(--purple-border);
      color: var(--text);
    }
    .btn-send {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      background: linear-gradient(135deg, var(--purple-dim), var(--purple));
      color: #fff;
      border: 1px solid var(--purple-light);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.25s;
      box-shadow: 0 0 20px var(--purple-glow), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-send:hover {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      box-shadow: 0 0 30px rgba(124,58,237,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .btn-send:active { transform: translateY(0); }

    .icon-btn {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      cursor: pointer;
      color: var(--text-dim);
      border-radius: 4px;
      transition: all 0.15s;
      font-size: 13px;
    }
    .icon-btn:hover { background: var(--surface3); color: var(--text-muted); }
    .icon-btn.danger:hover { background: rgba(239,68,68,0.1); color: var(--danger); }

    /* ─── MAIN LAYOUT ─── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── EDITOR PANEL ─── */
    .editor {
      width: 380px;
      min-width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .editor-scroll::-webkit-scrollbar { width: 4px; }
    .editor-scroll::-webkit-scrollbar-track { background: transparent; }
    .editor-scroll::-webkit-scrollbar-thumb { background: var(--purple-dim); border-radius: 2px; }

    /* ─── LABELS ─── */
    .label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .char-count { font-size: 10px; color: var(--text-dim); font-family: 'Inter', sans-serif; text-transform: none; font-weight: 400; }

    /* ─── INPUTS ─── */
    input[type="text"], input[type="url"], textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      font-family: 'Inter', sans-serif;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus, input[type="url"]:focus, textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 2px var(--purple-glow);
    }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    textarea { resize: vertical; min-height: 56px; line-height: 1.5; }

    /* ─── COLLAPSIBLE SECTIONS ─── */
    .section-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
      gap: 7px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.15s, background 0.15s;
    }
    .section-header:hover { color: var(--text); background: rgba(124,58,237,0.05); }
    .section-arrow {
      width: 14px; height: 14px;
      transition: transform 0.2s;
      flex-shrink: 0;
      color: var(--purple-light);
    }
    .section-arrow.open { transform: rotate(90deg); }
    .section-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .section-body.hidden { display: none; }

    /* ─── WEBHOOK INPUT ROW ─── */
    .webhook-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .webhook-row input { flex: 1; }

    /* ─── EMBED BLOCK ─── */
    .embed-block {
      background: var(--surface2);
      border: 1px solid var(--purple-border);
      border-left: 3px solid var(--purple);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: -2px 0 12px rgba(124,58,237,0.15);
    }
    .embed-header {
      display: flex;
      align-items: center;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
      gap: 7px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      transition: background 0.15s;
    }
    .embed-header:hover { background: rgba(124,58,237,0.06); }
    .embed-header span { flex: 1; }
    .embed-actions { display: flex; gap: 3px; }
    .embed-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .embed-body.hidden { display: none; }

    /* ─── FIELD ITEM ─── */
    .field-item {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .field-header {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      cursor: pointer;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      transition: background 0.1s;
    }
    .field-header:hover { background: rgba(255,255,255,0.03); }
    .field-header span { flex: 1; color: var(--text); font-size: 11px; }
    .field-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .field-body.hidden { display: none; }

    /* ─── TOGGLE ─── */
    .inline-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
      padding-top: 20px;
    }
    .toggle { position: relative; width: 32px; height: 17px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid var(--border);
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 11px; height: 11px;
      left: 2px; top: 2px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--purple); border-color: var(--purple); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(15px); background: #fff; }

    /* ─── COLOR PICKER ─── */
    .color-row { display: flex; gap: 8px; align-items: center; }
    input[type="color"] {
      width: 34px; height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2px;
      background: var(--bg);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ─── RESIZE HANDLE ─── */
    .resize-handle {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .resize-handle:hover, .resize-handle.dragging { background: var(--purple); }
    .resize-handle::after {
      content: '';
      width: 1px;
      height: 40px;
      background: var(--purple-light);
      border-radius: 1px;
      opacity: 0.5;
    }
    .resize-handle:hover::after, .resize-handle.dragging::after { opacity: 1; }

    /* ─── PREVIEW PANEL ─── */
    .preview {
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .preview-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .preview-header::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--purple-light);
      box-shadow: 0 0 6px var(--purple);
    }
    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .preview-scroll::-webkit-scrollbar { width: 4px; }
    .preview-scroll::-webkit-scrollbar-track { background: transparent; }
    .preview-scroll::-webkit-scrollbar-thumb { background: var(--purple-dim); border-radius: 2px; }

    /* ─── DISCORD MESSAGE PREVIEW ─── */
    .discord-bg {
      background: #313338;
      border-radius: 10px;
      padding: 16px;
      min-height: 100px;
    }
    .discord-msg { display: flex; gap: 14px; }
    .discord-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--purple);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #fff;
      overflow: hidden;
    }
    .discord-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .discord-content { flex: 1; min-width: 0; }
    .discord-username {
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      margin-bottom: 3px;
      font-family: -apple-system, sans-serif;
    }
    .discord-username .bot-tag {
      background: #5865f2;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: 5px;
      vertical-align: middle;
      font-family: -apple-system, sans-serif;
    }
    .discord-text {
      font-size: 13px;
      color: #dcddde;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: -apple-system, sans-serif;
    }

    /* Discord embed */
    .discord-embed {
      display: flex;
      max-width: 480px;
      background: #2b2d31;
      border-radius: 4px;
      border-left: 4px solid #5865f2;
      overflow: hidden;
      margin-top: 6px;
    }
    .discord-embed-inner { flex: 1; padding: 10px 14px 14px; min-width: 0; }
    .discord-embed-author { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .discord-embed-author-icon { width: 18px; height: 18px; border-radius: 50%; }
    .discord-embed-author-name { font-size: 12px; font-weight: 600; color: #dbdee1; font-family: -apple-system, sans-serif; }
    .discord-embed-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px; line-height: 1.375; font-family: -apple-system, sans-serif; }
    .discord-embed-title a { color: #00aff4; text-decoration: none; }
    .discord-embed-title a:hover { text-decoration: underline; }
    .discord-embed-description { font-size: 13px; color: #dcddde; line-height: 1.5; margin-bottom: 6px; white-space: pre-wrap; word-break: break-word; font-family: -apple-system, sans-serif; }
    .discord-embed-fields { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .discord-embed-field { min-width: 0; }
    .discord-embed-field.inline { flex: 1; min-width: 100px; }
    .discord-embed-field-name { font-size: 12px; font-weight: 700; color: #dbdee1; margin-bottom: 2px; font-family: -apple-system, sans-serif; }
    .discord-embed-field-value { font-size: 12px; color: #dcddde; line-height: 1.375; white-space: pre-wrap; word-break: break-word; font-family: -apple-system, sans-serif; }
    .discord-embed-image img { max-width: 100%; border-radius: 4px; margin-top: 10px; }
    .discord-embed-thumbnail { flex-shrink: 0; padding: 10px 10px 0 0; }
    .discord-embed-thumbnail img { width: 72px; height: 72px; border-radius: 4px; object-fit: cover; }
    .discord-embed-footer { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .discord-embed-footer-icon { width: 14px; height: 14px; border-radius: 50%; }
    .discord-embed-footer-text { font-size: 11px; color: #a3a6aa; font-family: -apple-system, sans-serif; }

    /* ─── EMPTY STATE ─── */
    .empty-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-dim);
      font-size: 12px;
      gap: 10px;
      text-align: center;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.05em;
    }
    .empty-preview svg { opacity: 0.15; }

    /* ─── SEND BAR ─── */
    .send-bar { padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }

    /* ─── GRID HELPERS ─── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .flex-row { display: flex; align-items: flex-start; gap: 8px; }
    .flex-1 { flex: 1; }
    .mt-4 { margin-top: 4px; }
    .divider { height: 1px; background: var(--border); }

    /* ─── TOAST ─── */
    .toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 99999; }
    .toast {
      padding: 10px 16px;
      border-radius: var(--radius-lg);
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: toastIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .toast.success { background: #1a3a28; border-color: rgba(34,197,94,0.3); }
    .toast.error { background: #3a1a1a; border-color: rgba(239,68,68,0.3); }
    .toast.info { background: #1a1a3a; border-color: var(--purple-border); }
    @keyframes toastIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ─── TAG PILL ─── */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pill-purple { background: rgba(124,58,237,0.2); color: var(--purple-light); border: 1px solid var(--purple-border); }
  </style>
</head>
<body>

<!-- TOP BAR -->

// ── STATE ──
let state = { webhookUrl:'', profileName:'', profileAvatar:'', content:'', embeds:[] };
let embedCount = 0;
let fieldCount = 0;

window.addEventListener('load', () => {
  const saved = localStorage.getItem('nwx_webhook_state');
  if (saved) { try { loadState(JSON.parse(saved)); } catch(e) {} }
  initResize();
  updatePreview();
});

function loadState(s) {
  state = { webhookUrl:'', profileName:'', profileAvatar:'', content:'', embeds:[], ...s };
  document.getElementById('webhookUrl').value = state.webhookUrl || '';
  document.getElementById('profileName').value = state.profileName || '';
  document.getElementById('profileAvatar').value = state.profileAvatar || '';
  document.getElementById('messageContent').value = state.content || '';
  countChars('messageContent','contentCount',2000);
  document.getElementById('embedsContainer').innerHTML = '';
  embedCount = 0; fieldCount = 0;
  (state.embeds || []).forEach(e => addEmbed(e));
  updatePreview();
}

function saveState() {
  state.webhookUrl = document.getElementById('webhookUrl').value;
  state.profileName = document.getElementById('profileName').value;
  state.profileAvatar = document.getElementById('profileAvatar').value;
  state.content = document.getElementById('messageContent').value;
  localStorage.setItem('nwx_webhook_state', JSON.stringify(state));
}

// ── RESIZE ──
function initResize() {
  const handle = document.getElementById('resizeHandle');
  const editor = document.getElementById('editorPanel');
  let dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = editor.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const newW = Math.max(260, Math.min(700, startW + delta));
    editor.style.width = newW + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
}

// ── EMBEDS ──
function addEmbed(data = {}) {

    description: data.description||'', color: data.color||'#7c3aed',
    authorName: data.authorName||'', authorUrl: data.authorUrl||'', authorIconUrl: data.authorIconUrl||'',
    thumbnail: data.thumbnail||'', image: data.image||'',
    footerText: data.footerText||'', footerIconUrl: data.footerIconUrl||'',
    fields: data.fields || []

  el.id = 'embed-' + id;
  el.style.borderLeftColor = embed.color;
  el.innerHTML = buildEmbedHTML(id, embed);

}

function toggleEmbed(id) {
  document.getElementById('embed-body-' + id)?.classList.toggle('hidden');
  document.getElementById('embed-arrow-' + id)?.classList.toggle('open');
}

function removeEmbed(id) {
  const idx = state.embeds.findIndex(e => e.id === id);
  if (idx !== -1) state.embeds.splice(idx, 1);
  document.getElementById('embed-' + id)?.remove();
  updatePreview(); saveState();
}

function updateEmbed(id, field, value) {
  const e = state.embeds.find(e => e.id === id);
  if (e) e[field] = value;
  updatePreview(); saveState();
}

function updateColorFromText(id, input) {
  if (/^#[0-9a-fA-F]{6}$/.test(input.value)) {
    updateEmbed(id, 'color', input.value);
    document.getElementById('embed-' + id).style.borderLeftColor = input.value;
    const picker = document.querySelector('#embed-' + id + ' input[type="color"]');
    if (picker) picker.value = input.value;
  }
}

function updateEmbedLabel(id) {
  const e = state.embeds.find(e => e.id === id);
  const lbl = document.getElementById('embed-label-' + id);
  if (lbl && e) lbl.textContent = e.title || 'Nouveau embed';
}

function cntDesc(id, val) {
  const el = document.getElementById('desc-' + id);
  if (el) el.textContent = val.length + '/4096';
}

// ── FIELDS ──
function addField(embedId, data = {}) {
  const fid = ++fieldCount;
  const embed = state.embeds.find(e => e.id === embedId);
  if (!embed) return;
  const field = { fid, name: data.name||'', value: data.value||'', inline: data.inline||false };
  if (!data.fid) embed.fields.push(field);

  const container = document.getElementById('fields-' + embedId);
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'field-item';
  el.id = 'field-' + fid;
  el.innerHTML = `
    <div class="field-header" onclick="toggleField(${fid})">
      <span id="flbl-${fid}">${esc(field.name || 'Champ sans nom')}</span>
      <div onclick="event.stopPropagation()">
        <button class="icon-btn danger" onclick="removeField(${embedId},${fid})" style="width:22px;height:22px;font-size:11px">✕</button>
      </div>
    </div>
    <div class="field-body hidden" id="fbody-${fid}">
      <div><div class="label">Nom</div><input type="text" placeholder="Nom" value="${esc(field.name)}" maxlength="256" oninput="updateField(${embedId},${fid},'name',this.value)" /></div>
      <div><div class="label">Valeur</div><textarea rows="3" maxlength="1024" placeholder="Valeur..." oninput="updateField(${embedId},${fid},'value',this.value)">${esc(field.value)}</textarea></div>
      <div class="flex-row">
        <div class="inline-toggle">
          <label class="toggle">
            <input type="checkbox" ${field.inline?'checked':''} onchange="updateField(${embedId},${fid},'inline',this.checked)" />
            <span class="toggle-slider"></span>
          </label>
          Inline
        </div>
      </div>
    </div>`;
  container.appendChild(el);
}

function toggleField(fid) { document.getElementById('fbody-' + fid)?.classList.toggle('hidden'); }

function updateField(embedId, fid, prop, value) {
  const e = state.embeds.find(e => e.id === embedId);
  if (!e) return;
  const f = e.fields.find(f => f.fid === fid);
  if (!f) return;
  f[prop] = value;
  if (prop === 'name') { const lbl = document.getElementById('flbl-' + fid); if (lbl) lbl.textContent = value || 'Champ sans nom'; }
  updatePreview(); saveState();
}

function removeField(embedId, fid) {
  const e = state.embeds.find(e => e.id === embedId);
  if (e) e.fields = e.fields.filter(f => f.fid !== fid);
  document.getElementById('field-' + fid)?.remove();
  updatePreview(); saveState();
}

// ── MARKDOWN ──
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMD(text) {
  if (!text) return '';
  let h = esc(text);
  h = h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/__(.+?)__/g,'<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/~~(.+?)~~/g,'<del>$1</del>');
  h = h.replace(/`(.+?)`/g,'<code style="background:rgba(0,0,0,0.3);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:90%">$1</code>');
  h = h.replace(/^&gt; (.+)$/gm,'<blockquote style="border-left:3px solid #4f545c;padding-left:8px;margin:2px 0;color:#a3a6aa">$1</blockquote>');
  h = h.replace(/\n/g,'<br>');
  return h;
}

// ── PREVIEW ──
function updatePreview() {
  const name = document.getElementById('profileName').value.trim();
  const avatar = document.getElementById('profileAvatar').value.trim();
  const content = document.getElementById('messageContent').value;
  const c = document.getElementById('previewContainer');
  if (!content.trim() && state.embeds.length === 0 && !name) {
    c.innerHTML = `<div class="empty-preview">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div>Remplis le formulaire<br/>pour voir l&apos;aperçu</div></div>`;
    return;
  }
  const avatarSrc = avatar || DEFAULT_NWX3;
  const avatarHTML = `<img src="${avatarSrc}" alt="" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />`;
  const embedsHTML = state.embeds.map(buildEmbedPreview).join('');
  c.innerHTML = `<div class="discord-bg"><div class="discord-msg">
    <div class="discord-avatar">${avatarHTML}</div>
    <div class="discord-content">
      <div class="discord-username">${esc(name || 'NWX Webhook')} <span class="bot-tag">APP</span></div>
      ${content ? `<div class="discord-text">${renderMD(content)}</div>` : ''}
      ${embedsHTML}
    </div>
  </div></div>`;
}

function buildEmbedPreview(embed) {
  const color = embed.color || '#7c3aed';
  let h = `<div class="discord-embed" style="border-left-color:${esc(color)};margin-top:6px">`;
  if (embed.thumbnail) h += `<div class="discord-embed-thumbnail"><img src="${esc(embed.thumbnail)}" alt="" /></div>`;
  h += `<div class="discord-embed-inner">`;
  if (embed.authorName) {
    h += `<div class="discord-embed-author">`;
    if (embed.authorIconUrl) h += `<img class="discord-embed-author-icon" src="${esc(embed.authorIconUrl)}" alt="" />`;
    h += `<span class="discord-embed-author-name">${embed.authorUrl ? `<a href="${esc(embed.authorUrl)}" target="_blank" style="color:#00aff4;text-decoration:none">${esc(embed.authorName)}</a>` : esc(embed.authorName)}</span></div>`;
  }
  if (embed.title) {
    h += `<div class="discord-embed-title">`;
    h += embed.titleUrl ? `<a href="${esc(embed.titleUrl)}" target="_blank">${renderMD(embed.title)}</a>` : renderMD(embed.title);
    h += `</div>`;
  }
  if (embed.description) h += `<div class="discord-embed-description">${renderMD(embed.description)}</div>`;
  if (embed.fields && embed.fields.length > 0) {
    h += `<div class="discord-embed-fields">`;
    embed.fields.forEach(f => {
      h += `<div class="discord-embed-field ${f.inline?'inline':''}"><div class="discord-embed-field-name">${renderMD(f.name)}</div><div class="discord-embed-field-value">${renderMD(f.value)}</div></div>`;
    });
    h += `</div>`;
  }
  if (embed.image) h += `<div class="discord-embed-image"><img src="${esc(embed.image)}" alt="" /></div>`;
  if (embed.footerText || embed.footerIconUrl) {
    h += `<div class="discord-embed-footer">`;
    if (embed.footerIconUrl) h += `<img class="discord-embed-footer-icon" src="${esc(embed.footerIconUrl)}" alt="" />`;
    if (embed.footerText) h += `<span class="discord-embed-footer-text">${esc(embed.footerText)}</span>`;
    h += `</div>`;
  }
  h += `</div></div>`;
  return h;
}

// ── SEND ──
async function sendWebhook() {
  const url = document.getElementById('webhookUrl').value.trim();
  if (!url) return toast('error','URL du webhook manquante !');
  if (!url.includes('discord.com/api/webhooks/')) return toast('error','URL Discord invalide');
  const content = document.getElementById('messageContent').value.trim();
  if (!content && state.embeds.length === 0) return toast('error','Ajoute du contenu ou un embed !');
  const payload = {};
  if (content) payload.content = content;
  const name = document.getElementById('profileName').value.trim();
  const avatar = document.getElementById('profileAvatar').value.trim();
  if (name) payload.username = name;
  if (avatar) payload.avatar_url = avatar;
  if (state.embeds.length > 0) {
    payload.embeds = state.embeds.map(e => {
      const em = {};
      if (e.title) em.title = e.title;
      if (e.titleUrl) em.url = e.titleUrl;
      if (e.description) em.description = e.description;
      if (e.color) em.color = parseInt(e.color.replace('#',''), 16);
      if (e.authorName) { em.author = {name: e.authorName}; if (e.authorUrl) em.author.url = e.authorUrl; if (e.authorIconUrl) em.author.icon_url = e.authorIconUrl; }
      if (e.thumbnail) em.thumbnail = {url: e.thumbnail};
      if (e.image) em.image = {url: e.image};
      if (e.footerText || e.footerIconUrl) { em.footer = {}; if (e.footerText) em.footer.text = e.footerText; if (e.footerIconUrl) em.footer.icon_url = e.footerIconUrl; }
      if (e.fields && e.fields.length) em.fields = e.fields.map(f => ({name: f.name||'\u200b', value: f.value||'\u200b', inline: !!f.inline}));
      return em;
    });
  }
  toast('info','Envoi en cours...');
  try {
    const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    if (res.ok || res.status === 204) toast('success','✓ Message envoyé !');
    else { const err = await res.json().catch(()=>({})); toast('error', 'Erreur ' + res.status + ': ' + (err.message||'Inconnue')); }
  } catch(e) { toast('error','Erreur réseau: ' + e.message); }
}

// ── UTILS ──
function toast(type, msg) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = (type==='success'?'✓':type==='error'?'✕':'→') + ' ' + msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function clearAll() {
  if (!confirm('Réinitialiser tout ?')) return;
  localStorage.removeItem('nwx_webhook_state');
  state = {webhookUrl:'', profileName:'', profileAvatar:'', content:'', embeds:[]};
  embedCount = 0; fieldCount = 0;
  document.getElementById('webhookUrl').value = '';
  document.getElementById('profileName').value = '';
  document.getElementById('profileAvatar').value = '';
  document.getElementById('messageContent').value = '';
  document.getElementById('contentCount').textContent = '0/2000';
  document.getElementById('embedsContainer').innerHTML = '';
  updatePreview();
}

function saveToJSON() {
  const data = { webhookUrl: document.getElementById('webhookUrl').value, profileName: document.getElementById('profileName').value, profileAvatar: document.getElementById('profileAvatar').value, content: document.getElementById('messageContent').value, embeds: state.embeds };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
  a.download = 'nwx-webhook.json'; a.click();
  toast('success','JSON exporté !');
}

function loadFromJSON() { document.getElementById('jsonFileInput').click(); }

function handleJSONFile(e) {
  const file = e.target.files[0]; if (!file) return;
  new FileReader().onload = ev => {
    try { loadState(JSON.parse(ev.target.result)); toast('success','Import réussi !'); } catch(err) { toast('error','JSON invalide'); }
  };
  (new FileReader()).readAsText(file);
  // fix: use proper reader
  const r = new FileReader();
  r.onload = ev => { try { loadState(JSON.parse(ev.target.result)); toast('success','Import réussi !'); } catch(err) { toast('error','JSON invalide'); } };
  r.readAsText(file);
  e.target.value = '';
}
